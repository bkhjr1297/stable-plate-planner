name: Daily Stable Plate Blog

on:
  schedule:
    - cron: "15 12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  daily-blog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Generate daily blog post
        run: python scripts/generate_daily_blog.py
      - name: Commit if changed
        run: |
          git config user.name "Annabelle Daily Content"
          git config user.email "actions@github.com"
          git add blog sitemap.xml
          if git diff --cached --quiet; then
            echo "No daily content changes."
          else
            git commit -m "Add daily stable plate blog post"
            git push
          fi
